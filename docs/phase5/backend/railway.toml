# Railway config — use when service Root Directory is set to docs/phase5/backend
# In the Railway dashboard, set "Config file path" to: docs/phase5/backend/railway.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
