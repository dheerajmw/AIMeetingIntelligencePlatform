<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MeetIQ - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;family=JetBrains+Mono&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#c0c1ff",
                        "inverse-surface": "#dae2fd",
                        "primary": "#c0c1ff",
                        "secondary-fixed-dim": "#7bd0ff",
                        "surface-tint": "#c0c1ff",
                        "surface-variant": "#2d3449",
                        "surface-bright": "#31394d",
                        "surface-container": "#171f33",
                        "on-secondary-container": "#00374d",
                        "on-error": "#690005",
                        "on-secondary": "#00354a",
                        "on-primary": "#1000a9",
                        "on-tertiary-fixed-variant": "#92002a",
                        "on-surface-variant": "#c7c4d7",
                        "surface-container-highest": "#2d3449",
                        "error": "#ffb4ab",
                        "on-surface": "#dae2fd",
                        "tertiary-fixed": "#ffdadb",
                        "on-secondary-fixed-variant": "#004c69",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "primary-container": "#8083ff",
                        "secondary": "#7bd0ff",
                        "on-secondary-fixed": "#001e2c",
                        "on-primary-fixed": "#07006c",
                        "surface-container-low": "#131b2e",
                        "surface": "#0b1326",
                        "inverse-primary": "#494bd6",
                        "on-primary-container": "#0d0096",
                        "on-tertiary": "#67001b",
                        "tertiary-container": "#ff516a",
                        "error-container": "#93000a",
                        "tertiary": "#ffb2b7",
                        "outline-variant": "#464554",
                        "surface-dim": "#0b1326",
                        "surface-container-high": "#222a3d",
                        "surface-container-lowest": "#060e20",
                        "outline": "#908fa0",
                        "secondary-fixed": "#c4e7ff",
                        "background": "#0b1326",
                        "on-background": "#dae2fd",
                        "secondary-container": "#00a6e0",
                        "on-tertiary-container": "#5b0017",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#ffb2b7",
                        "on-tertiary-fixed": "#40000d",
                        "inverse-on-surface": "#283044",
                        "primary-fixed": "#e1e0ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "unit": "4px",
                        "gutter": "24px",
                        "sm": "8px",
                        "xs": "4px",
                        "xl": "32px",
                        "md": "16px",
                        "lg": "24px",
                        "margin": "24px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-sm": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-md": ["Inter"],
                        "code": ["jetbrainsMono"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "code": ["13px", {"lineHeight": "20px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #0F172A; /* Base L0 Authority */
            margin: 0;
            overflow-x: hidden;
        }
        .login-card {
            background-color: #1E293B; /* Level 1 Card Authority */
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .atmosphere-glow {
            position: fixed;
            top: -10%;
            right: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, rgba(15, 23, 42, 0) 70%);
            z-index: 0;
            pointer-events: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen font-body-md text-on-surface">
<!-- Atmospheric Effect -->
<div class="atmosphere-glow"></div>
<main class="flex-grow flex items-center justify-center px-margin py-xl relative z-10">
<div class="w-full max-w-[440px] flex flex-col items-center">
<!-- Identity Header -->
<div class="mb-xl text-center">
<div class="inline-flex items-center justify-center w-12 h-12 mb-md rounded-xl bg-primary-container text-on-primary-container">
<span class="material-symbols-outlined !text-[28px]" style="font-variation-settings: 'FILL' 1;">insights</span>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-on-surface tracking-tight">MeetIQ</h1>
<p class="mt-xs font-body-md text-on-surface-variant">Precision insights for high-performance teams.</p>
</div>
<!-- Login Container (Card L1) -->
<div class="login-card w-full p-lg rounded-xl border border-surface-variant/50 shadow-2xl">
<!-- SSO Action -->
<button class="group relative flex w-full items-center justify-center gap-sm bg-primary text-on-primary font-label-md py-md rounded-lg transition-all hover:bg-primary-fixed-dim active:scale-[0.98]">
<span class="material-symbols-outlined text-[18px]">key</span>
                    Sign in with SSO
                </button>
<!-- Divider -->
<div class="relative my-lg flex items-center">
<div class="flex-grow border-t border-surface-variant"></div>
<span class="flex-shrink mx-md font-label-md text-on-surface-variant uppercase tracking-widest text-[10px]">OR</span>
<div class="flex-grow border-t border-surface-variant"></div>
</div>
<!-- Form -->
<form class="space-y-md" onsubmit="event.preventDefault();">
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant" for="workspace">Workspace Slug</label>
<div class="relative group">
<span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors text-[20px]">domain</span>
<input class="w-full pl-xl pr-md py-md bg-surface-container border border-surface-variant rounded-lg text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-body-md" id="workspace" name="workspace" placeholder="acme-corp" type="text"/>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant" for="email">Email</label>
<div class="relative group">
<span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors text-[20px]">mail</span>
<input class="w-full pl-xl pr-md py-md bg-surface-container border border-surface-variant rounded-lg text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-body-md" id="email" name="email" placeholder="alex.rivers@acme.com" type="email"/>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant" for="password">Password</label>
<div class="relative group">
<span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors text-[20px]">lock</span>
<input class="w-full pl-xl pr-[48px] py-md bg-surface-container border border-surface-variant rounded-lg text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-body-md" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full mt-md bg-surface-variant text-on-surface font-label-md py-md rounded-lg border border-outline-variant hover:bg-surface-container-highest transition-all active:scale-[0.98]" type="submit">
                        Continue with Email
                    </button>
</form>
<div class="mt-lg pt-md border-t border-surface-variant/30 flex justify-between items-center">
<a class="font-label-md text-primary hover:underline transition-all" href="#">Forgot password?</a>
<span class="w-1 h-1 rounded-full bg-surface-variant"></span>
<a class="font-label-md text-on-surface-variant hover:text-on-surface transition-colors" href="#">Switch Methods</a>
</div>
</div>
<!-- Footer Link -->
<div class="mt-xl flex flex-col items-center gap-xs">
<p class="font-body-md text-on-surface-variant">Don't have a workspace yet?</p>
<a class="font-label-md text-primary-fixed-dim hover:text-primary transition-colors flex items-center gap-xs" href="#">
                    Request Access
                    <span class="material-symbols-outlined text-[16px]">arrow_forward</span>
</a>
</div>
</div>
</main>
<!-- Visual Anchor / Side Content (Desktop Only) -->
<div class="hidden lg:block fixed right-0 top-0 bottom-0 w-1/3 h-full overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-l from-surface-container-low/50 to-transparent"></div>
<div class="h-full w-full flex items-center justify-center p-xl">
<div class="relative w-full max-w-md aspect-square bg-surface-container rounded-3xl border border-surface-variant/30 overflow-hidden">
<div class="absolute inset-0 opacity-40 bg-[radial-gradient(circle_at_50%_120%,#6366F1_0%,transparent_50%)]"></div>
<!-- Data Visualization Mock -->
<div class="p-lg flex flex-col h-full">
<div class="flex justify-between items-center mb-xl">
<div class="flex gap-xs">
<div class="w-2 h-2 rounded-full bg-error"></div>
<div class="w-2 h-2 rounded-full bg-secondary"></div>
<div class="w-2 h-2 rounded-full bg-primary"></div>
</div>
<div class="font-code text-on-surface-variant text-[10px] tracking-tight">MI-CORE_V2.0.441</div>
</div>
<div class="flex-grow flex flex-col justify-center space-y-md">
<div class="h-12 w-3/4 bg-surface-variant rounded-lg animate-pulse"></div>
<div class="h-4 w-full bg-surface-variant/50 rounded-lg animate-pulse"></div>
<div class="h-4 w-5/6 bg-surface-variant/50 rounded-lg animate-pulse" style="animation-delay: 0.2s"></div>
<div class="h-4 w-4/6 bg-surface-variant/50 rounded-lg animate-pulse" style="animation-delay: 0.4s"></div>
</div>
<div class="mt-auto pt-lg border-t border-surface-variant/30 font-label-md text-on-surface-variant/60 flex justify-between">
<span>LATENCY: 12ms</span>
<span>STATUS: READY</span>
</div>
</div>
</div>
</div>
</div>
<script>
        // Subtle interaction script
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.closest('.login-card').style.boxShadow = '0 20px 50px -12px rgba(99, 102, 241, 0.15)';
            });
            input.addEventListener('blur', () => {
                input.parentElement.closest('.login-card').style.boxShadow = 'none';
            });
        });

        // Background floating atmosphere
        document.addEventListener('mousemove', (e) => {
            const glow = document.querySelector('.atmosphere-glow');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            glow.style.transform = `translate(${x * 20}px, ${y * 20}px)`;
        });
    </script>
</body></html>
