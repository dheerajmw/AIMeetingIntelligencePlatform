# Render Blueprint — repository root (required location for Blueprint sync)
# MeetIQ Phase 5 API lives in docs/phase5/backend

services:
  - type: web
    name: meetiq-api
    runtime: docker
    rootDir: docs/phase5/backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: meetiq-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DEV_AUTH_ENABLED
        value: "true"
      - key: AUTH_DISABLED
        value: "false"
      - key: INTEGRATIONS_STUB_MODE
        value: "false"
      - key: WHISPER_MODEL
        value: tiny
      - key: STORAGE_ROOT
        value: /var/data/storage
      - key: DATABASE_URL
        value: sqlite:////var/data/app.db
      - key: CORS_ORIGINS
        sync: false
